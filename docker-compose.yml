services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  trino:
    image: trinodb/trino
    depends_on:
      - minio
    volumes:
      - ./trino/catalog:/etc/trino/catalog

  quiz:
    build: ./app
    ports:
      - "3000:3000"
    depends_on:
      - minio
      - trino
    environment:
      - TRINO_HOST=trino
      - TRINO_PORT=8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - ./data:/data:ro

volumes:
  minio-data:
